<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SCI - Premium Tech Education</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#08152e",
          "primary-container": "#1e2a44",
          surface: "#f8f9fa",
          "surface-container-low": "#f3f4f5",
          "surface-container-lowest": "#ffffff",
          "on-surface": "#191c1d",
          "on-surface-variant": "#45464d",
          "tertiary-fixed": "#ffddb4",
          "on-tertiary-container": "#c78300"
        },
        fontFamily: { headline: ["Manrope"], body: ["Inter"] }
      }
    }
  }
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.editorial-gradient { background: linear-gradient(135deg, #08152e 0%, #1e2a44 100%); }
</style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-tertiary-fixed selection:text-primary" data-page="home">
<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-sm flex justify-between items-center px-6 h-20">
  <span class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-slate-900 to-slate-700 font-headline tracking-tight">SCI</span>
  <div class="hidden md:flex items-center gap-4 ml-auto">
    <a class="text-blue-700 font-bold px-3 py-2 rounded-lg" href="#">Home</a>
    <a class="text-slate-500 hover:bg-slate-100 px-3 py-2 rounded-lg" href="./courses.html" data-route="./courses.html">Courses</a>
    <a class="text-slate-500 hover:bg-slate-100 px-3 py-2 rounded-lg" href="./login.html" data-route="./login.html">Login</a>
    <a class="text-slate-500 hover:bg-slate-100 px-3 py-2 rounded-lg" href="./register.html" data-route="./register.html">Register</a>
  </div>
</nav>

<main class="pt-20">
  <section class="relative min-h-[720px] flex items-center overflow-hidden bg-surface-container-low px-6">
    <div class="container mx-auto grid lg:grid-cols-2 gap-12 items-center z-10">
      <div class="space-y-8">
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-tertiary-fixed text-primary rounded-full text-sm font-semibold tracking-wide"><span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">verified</span>ADMISSION OPEN <span id="admissionYear"></span></div>
        <h1 class="text-5xl lg:text-7xl font-headline font-extrabold text-primary leading-[1.1] tracking-tight">Get Skilled with <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-on-tertiary-container to-amber-500">Computers &amp; Tech</span> Services</h1>
        <p class="text-xl text-on-surface-variant max-w-xl leading-relaxed">Grow Your Skills with industry-leading faculty and state-of-the-art infrastructure at Patna's premier technology atelier.</p>
        <div class="flex flex-wrap gap-4 pt-4">
          <button class="editorial-gradient text-white px-10 py-5 rounded-xl font-bold text-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all" data-route="./register.html">Register Now</button>
          <button class="bg-surface-container-lowest text-primary border border-slate-200 px-10 py-5 rounded-xl font-bold text-lg hover:bg-slate-100 transition-all" data-route="./courses.html">View Courses</button>
        </div>
      </div>
      <div class="relative hidden lg:block">
        <div class="relative rounded-[2.5rem] overflow-hidden shadow-2xl transform rotate-2 hover:rotate-0 transition-transform duration-700 group">
          <img alt="Student working on computer" class="w-full h-[560px] object-cover scale-110 group-hover:scale-100 transition-transform duration-1000" src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80"/>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="./js/app.js"></script>
<script>
  (function () {
    var yearEl = document.getElementById('admissionYear');
    if (yearEl) {
      yearEl.textContent = String(new Date().getFullYear());
    }
  })();
</script>
</body></html>
