<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - Shivam Computer Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#08152e",
          "primary-container": "#1e2a44",
          surface: "#f8f9fa",
          "surface-container-low": "#f3f4f5",
          "surface-container-lowest": "#ffffff",
          "on-surface": "#191c1d",
          "on-surface-variant": "#45464d",
          "outline": "#75777e",
          "outline-variant": "#c5c6ce",
          "tertiary-fixed-dim": "#ffb955",
          "on-tertiary-container": "#c78300"
        },
        fontFamily: { headline: ["Manrope", "sans-serif"], body: ["Inter", "sans-serif"] },
        borderRadius: { xl: "0.75rem", full: "9999px" }
      }
    }
  }
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
.academic-pattern { background-color: #f8f9fa; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231e2a44' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
.glass-effect { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.85); }
</style>
</head>
<body class="font-body bg-surface text-on-surface min-h-screen flex flex-col" data-page="register">
<main class="flex-grow flex items-center justify-center p-6 academic-pattern relative overflow-hidden">
  <div class="w-full max-w-md z-10">
    <div class="text-center mb-10">
      <h1 class="font-headline text-3xl font-extrabold text-primary tracking-tight mb-2">Shivam Computer Institute</h1>
      <p class="text-on-surface-variant font-medium">Create your account</p>
    </div>

    <div class="bg-surface-container-lowest glass-effect rounded-xl shadow-[0_32px_64px_-15px_rgba(8,21,46,0.08)] p-8 border border-white/20">
      <form id="registerForm" class="space-y-6" method="POST">
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface ml-1" for="name">Full Name</label>
          <input id="name" name="name" class="block w-full px-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest focus:border-primary transition-all duration-200 outline-none" placeholder="Your name" required type="text"/>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface ml-1" for="email">Email Address</label>
          <input id="email" name="email" class="block w-full px-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest focus:border-primary transition-all duration-200 outline-none" placeholder="212myashraj@gmail.com" required type="email"/>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface ml-1" for="password">Password</label>
          <input id="password" name="password" class="block w-full px-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest focus:border-primary transition-all duration-200 outline-none" placeholder="••••••••" required type="password"/>
        </div>

        <input name="role" type="hidden" value="student" />

        <button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-xl shadow-lg hover:shadow-primary/20 active:scale-95 transition-all duration-300" type="submit">
          Create Account
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-on-surface-variant text-sm">Already have an account?
          <a class="text-primary font-bold hover:underline decoration-tertiary-fixed-dim decoration-2 underline-offset-4 ml-1" href="./login.html">Login</a>
        </p>
      </div>
    </div>
  </div>
</main>
<script src="./js/app.js"></script>
</body>
</html>
