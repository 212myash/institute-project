<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Course Catalog - Shivam Computer Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#08152e",
          "primary-container": "#1e2a44",
          "surface": "#f8f9fa",
          "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f3f4f5",
          "secondary-container": "#cfe2f9",
          "on-surface": "#191c1d",
          "on-surface-variant": "#45464d",
          "tertiary-fixed-dim": "#ffb955",
          "on-tertiary-container": "#c78300"
        },
        fontFamily: { headline: ["Manrope"], body: ["Inter"] },
        borderRadius: { xl: "1.5rem", full: "9999px" }
      }
    }
  }
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.course-card-shadow { box-shadow: 0 8px 32px rgba(25, 28, 29, 0.04); }
.course-card-shadow:hover { box-shadow: 0 12px 40px rgba(25, 28, 29, 0.08); }
</style>
</head>
<body class="bg-surface font-body text-on-surface" data-page="courses">
<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-sm flex justify-between items-center px-6 h-20 w-full">
  <div class="flex items-center gap-8">
    <span class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-slate-900 to-slate-700 font-headline tracking-tight">Shivam Computer Institute</span>
  </div>
  <div class="flex items-center gap-2">
    <span class="text-sm font-semibold text-on-surface-variant">Hi, <span data-user-name>User</span></span>
    <button class="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-all" data-logout><span class="material-symbols-outlined">logout</span></button>
  </div>
</nav>

<main class="pt-28 pb-24 px-6 lg:px-12 min-h-screen">
  <header class="mb-12">
    <h1 class="text-4xl md:text-5xl font-extrabold font-headline text-primary tracking-tight mb-4">Course Catalog</h1>
    <p class="text-on-surface-variant max-w-2xl text-lg leading-relaxed">Refine your digital craftsmanship with our specialized curriculum.</p>
  </header>

  <div id="coursesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div id="courseCardTemplate" class="group bg-surface-container-lowest rounded-xl course-card-shadow overflow-hidden transition-all duration-300 hover:scale-[1.02] flex flex-col hidden">
      <div class="h-48 overflow-hidden relative">
        <img alt="Course" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=80"/>
        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] font-bold text-primary flex items-center gap-1 uppercase tracking-wider">
          <span class="material-symbols-outlined text-xs">schedule</span> 3 Months
        </div>
      </div>
      <div class="p-6 flex flex-col flex-1">
        <h3 data-course-title class="text-xl font-bold font-headline text-primary leading-tight">Course Title</h3>
        <p data-course-description class="text-sm text-on-surface-variant mt-3 line-clamp-3">Course description</p>
        <div class="mt-auto pt-6">
          <div class="flex justify-between items-end mb-2">
            <span class="text-xs font-bold text-on-surface-variant">Progress</span>
            <span data-course-progress class="text-xs font-bold text-primary">0%</span>
          </div>
          <div class="h-1.5 w-full bg-secondary-container rounded-full mb-4">
            <div data-course-progress-bar class="h-full bg-gradient-to-r from-tertiary-fixed-dim to-on-tertiary-container rounded-full" style="width: 0%"></div>
          </div>
          <button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-bold py-3 px-6 rounded-xl hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">Continue <span class="material-symbols-outlined text-sm">arrow_forward</span></button>
        </div>
      </div>
    </div>
  </div>
</main>

<nav class="fixed bottom-0 w-full rounded-t-3xl md:hidden bg-white/80 backdrop-blur-xl flex justify-around items-center h-20 px-4 pb-safe z-50 border-t border-slate-100">
  <a class="flex flex-col items-center justify-center text-slate-400" href="./student-dashboard.html" data-route="./student-dashboard.html"><span class="material-symbols-outlined">home</span><span class="text-[10px] font-manrope font-medium">Home</span></a>
  <a class="flex flex-col items-center justify-center bg-amber-100 text-blue-900 rounded-2xl px-5 py-2 scale-110 transition-transform" href="#"><span class="material-symbols-outlined">local_library</span><span class="text-[10px] font-manrope font-medium">Courses</span></a>
  <a class="flex flex-col items-center justify-center text-slate-400" href="#" data-logout><span class="material-symbols-outlined">logout</span><span class="text-[10px] font-manrope font-medium">Logout</span></a>
</nav>
<script src="./js/app.js"></script>
</body></html>
